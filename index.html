<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAJ KIRYANA STORE - आज का भाव</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind', sans-serif; background-color: #cbd5e1; margin: 0; padding: 10px; }
        .a4-sheet { width: 100%; max-width: 210mm; padding: 6mm 10mm 4mm 10mm; margin: 0 auto 20px auto; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; border-radius: 8px; }
        .dot-line { border-bottom: 2px dotted #e2e8f0; flex-grow: 1; margin: 0 6px; margin-bottom: 5px; min-width: 15px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // CONFIGURATION: 
        const SUPABASE_URL = "https://socyjcfnvkfuntqbplxh.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_jGTD3v4o8EbrJmWWFnttFw_qDUkrAgF"; 
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const App = () => {
            const [pages, setPages] = React.useState([]);
            const [lastUpdatedDate, setLastUpdatedDate] = React.useState("");
            const [loading, setLoading] = React.useState(true);

            const storeName = "RAJ KIRYANA STORE";
            const sinceText = "Since 1995";
            const subtitle1 = "(राज की दुकान)";
            const subtitle2 = "गाँव अहरी, झज्जर";
            const tagline1 = "31 वर्षों का भरोसा";
            const tagline2 = "शुद्ध सामान";
            const tagline3 = "उचित दाम";
            const contact1 = "9466546715";
            const contact2 = "9812438025";

            React.useEffect(() => {
                const getLivePrices = async () => {
                    try {
                        let { data, error } = await supabase
                            .from('daily_bhav')
                            .select('*')
                            .eq('id', 1)
                            .single();
                        
                        if (data) {
                            setPages(data.price_data);
                            setLastUpdatedDate(data.last_updated);
                        }
                    } catch (err) {
                        console.error("Error pulling pricing structures:", err);
                    } finally {
                        setLoading(false);
                    }
                };
                getLivePrices();
            }, []);

            if (loading || pages.length === 0) {
                return <div className="text-center font-bold p-10 text-slate-800">ताज़ा भाव लोड हो रहे हैं... कृपया प्रतीक्षा करें।</div>;
            }

            return (
                <div className="flex flex-col items-center p-2 sm:p-4 bg-[#cbd5e1] min-h-screen">
                    {pages.map((page, pIdx) => (
                        <div key={page.id} className="a4-sheet relative bg-white shadow-xl rounded-xl w-full max-w-[210mm] p-[6mm_10mm_4mm_10mm] mb-6 flex flex-col">
                            {/* Header Section */}
                            <div className="text-center py-2 mb-2 bg-[#f4f1eb] border-y-[3px] border-[#5a504a] relative rounded-t-md">
                                <div className="relative mb-1 flex justify-center items-end px-4 w-full">
                                    <h1 className="text-3xl sm:text-4xl font-black text-[#1a1f2e] tracking-tight uppercase text-center w-full">{storeName}</h1>
                                    <div className="absolute right-2 sm:right-8 bottom-1"><span className="text-[10px] sm:text-sm font-bold text-[#81685d] italic hidden sm:block">{sinceText}</span></div>
                                </div>
                                <div className="flex justify-center gap-2 text-[0.9rem] sm:text-[1.1rem] font-bold text-[#5a4941]">
                                    <span>{subtitle1}</span>
                                    <span>•</span>
                                    <span>{subtitle2}</span>
                                </div>
                                <div className="flex flex-wrap justify-center gap-1 sm:gap-2 text-[0.75rem] sm:text-[0.9rem] font-bold text-[#69798e]">
                                    <span className="hidden sm:inline">|</span>
                                    <span>{tagline1}</span>
                                    <span>●</span>
                                    <span>{tagline2}</span>
                                    <span>●</span>
                                    <span>{tagline3}</span>
                                    <span className="hidden sm:inline">|</span>
                                </div>
                            </div>

                            <div className="flex justify-between items-center mb-3 px-2 sm:px-4 py-1.5 bg-blue-50 rounded border border-blue-100">
                                <div className="flex items-center gap-1 sm:gap-2">
                                    <span className="text-[9px] sm:text-[10px] font-bold text-blue-400 uppercase">तारीख अपडेट:</span>
                                    <span className="font-black text-blue-900 text-xs sm:text-sm">{lastUpdatedDate}</span>
                                </div>
                                <div className="text-lg sm:text-xl font-black text-blue-900 uppercase tracking-tighter">आज का भाव</div>
                                <div className="text-[9px] sm:text-[10px] font-black text-blue-900/30">P-{pIdx + 1}</div>
                            </div>

                            <div className="flex gap-4 sm:gap-8 flex-grow flex-col sm:flex-row">
                                {['left', 'right'].map(side => (
                                    <div key={side} className="w-full sm:w-1/2 flex flex-col gap-4">
                                        {page.categories.filter(c => c.side === side).map(cat => (
                                            <div key={cat.id}>
                                                <div className="border-b-[2px] border-red-800 mb-2">
                                                    <h3 className="font-black text-red-800 uppercase text-[14px] sm:text-[15px] m-0">{cat.name}</h3>
                                                </div>
                                                <div className="space-y-2">
                                                    {cat.items.map((prod, idx) => (
                                                        <div key={idx}>
                                                            <div className="flex items-baseline gap-1">
                                                                <span className="font-black text-[15px] sm:text-[16px] text-blue-900 flex-shrink-0">{prod.name}</span>
                                                                {prod.varieties.length === 1 && !prod.varieties[0].name && (
                                                                    <React.Fragment>
                                                                        <div className="dot-line flex-grow border-b-2 dotted border-slate-300 mx-2"></div>
                                                                        <div className="flex items-center flex-shrink-0 text-[15px] sm:text-[16px]">
                                                                            <span className="text-emerald-700 font-black mr-1">₹</span>
                                                                            <span className="text-center font-black text-slate-900">{prod.varieties[0].price}</span>
                                                                            <span className="text-[9px] sm:text-[10px] text-emerald-700 font-bold ml-1 uppercase">/{prod.varieties[0].unit}</span>
                                                                        </div>
                                                                    </React.Fragment>
                                                                )}
                                                            </div>
                                                            { (prod.varieties.length > 1 || (prod.varieties.length === 1 && prod.varieties[0].name)) && (
                                                                <div className="space-y-1 mt-1">
                                                                    {prod.varieties.map((v, vIdx) => (
                                                                        <div key={vIdx} className="ml-4 flex items-baseline gap-1">
                                                                            <span className="text-emerald-700 italic font-bold text-[13px] sm:text-[14px] flex-shrink-0">{v.name}</span>
                                                                            <div className="dot-line flex-grow border-b-2 dotted border-slate-200 mx-2 opacity-60"></div>
                                                                            <div className="flex items-center flex-shrink-0 text-[15px] sm:text-[16px]">
                                                                                <span className="text-emerald-700 font-black mr-1">₹</span>
                                                                                <span className="text-center font-black text-slate-900">{v.price}</span>
                                                                                <span className="text-[9px] sm:text-[10px] text-emerald-700 font-bold ml-1 uppercase">/{v.unit}</span>
                                                                           </div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>

                            {/* Contact Footer */}
                            <div className="mt-4 pt-3 border-t-2 border-slate-200 bg-[#0f172a] p-3 rounded-lg flex justify-around items-center">
                                <div className="text-center">
                                    <p className="text-white font-bold text-xs sm:text-sm m-0">सुरेंद्र (Surender)</p>
                                    <p className="text-[#fbbf24] font-black text-lg sm:text-xl tracking-wider m-0">{contact1}</p>
                                </div>
                                <div className="text-center">
                                    <p className="text-white font-bold text-xs sm:text-sm m-0">बिजेंद्र (Bijender)</p>
                                    <p className="text-[#fbbf24] font-black text-lg sm:text-xl tracking-wider m-0">{contact2}</p>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
